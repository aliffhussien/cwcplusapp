                "time": "40m",

                    },
                    {

                    {

                        "items": [

                            "1 genggam suhun (rendam lembut)",

                            "5 ekor udang (saiz sederhana)",
                            "100 ml santan pekat (1 mangkuk)",
                            "2-3 sudu besar kicap manis",
                            "Garam secukupnya",
                            "Gula melaka (kurangkan sebab ada kicap)"

                    }
                ],
                "instructions": [
                    {
                        "section": "Cara Memasak",
                        "steps": [
                            "Gaul tauhu, kentang & tempe dengan garam dan kunyit.",

                            "Panaskan sedikit minyak. Tumis bahan kisar sehingga garing & pecah minyak (±5–7 minit).",
                            "Masukkan serai, kacau sampai wangi.",
                            "Masukkan tauhu, kentang, tempe goreng, fucuk & suhun. Masukkan air asam dan gaul rata.",
                            "Masukkan kicap. Gaul sampai semua bahan bersalut dan warna jadi cantik.",
                            "Masukkan kacang panjang, santan, udang, dan cili merah. Perasakan dengan garam & sedikit gula.",
                            "Masak hingga udang masak dan kuah jadi sedikit pekat & berlemak. Siap untuk dihidang."
                        ]
                    }
                ],
                "tips": [],
                "notes": []

        ];

        let activeRecipe = null;
        let activeTab = 'ingredients';

        const recipeGrid = document.getElementById('recipe-grid');
        const emptyState = document.getElementById('empty-state');
        const searchInput = document.getElementById('search-input');
        const modal = document.getElementById('recipe-modal');
        const modalContent = document.getElementById('modal-content');

        function renderRecipes(recipes) {
            recipeGrid.innerHTML = '';
            if (recipes.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                recipes.forEach((recipe, index) => {
                    const card = document.createElement('div');
                    card.className = 'animate-fade-in group bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-2xl hover:-translate-y-1 transition-all duration-500 cursor-pointer border border-gray-100 flex flex-col h-full';
                    card.onclick = () => openModal(recipe);

                    const imageUrl = `./image of CWC 18/${recipe.slug}.jpeg`;

                    card.innerHTML = `
                        <div class="relative aspect-[4/3] overflow-hidden bg-gray-200">
                            <img src="${imageUrl}" alt="${recipe.title}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" onerror="this.src='https://via.placeholder.com/400x300/f3f4f6/059669?text=${encodeURIComponent(recipe.title)}'">
                            ${recipe.video_link ? `
                            <div class="absolute top-3 right-3 bg-teal-500 text-white p-2 rounded-full shadow-lg">
                                <i data-lucide="play" class="w-4 h-4 fill-current"></i>
                            </div>` : ''}
                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-end p-5">
                                <span class="text-white text-sm font-bold tracking-wide uppercase">Buka Resepi</span>
                            </div>
                        </div>
                        <div class="p-3 md:p-4 flex-grow flex flex-col justify-between">
                            <h3 class="font-extrabold text-gray-800 text-[13px] md:text-lg line-clamp-2 leading-tight group-hover:text-emerald-600 transition-colors">
                                ${recipe.title}
                            </h3>
                            <div class="mt-2 md:mt-3 pt-2 md:pt-3 border-t border-gray-50 flex flex-wrap gap-1.5 md:gap-3 text-[10px] md:text-xs text-gray-500">
                                <span class="inline-flex items-center gap-1 bg-gray-100 px-1.5 py-1 md:px-2 md:py-1 rounded-md shrink-0">
                                    <i data-lucide="clock" class="w-3 h-3 md:w-3.5 md:h-3.5 text-emerald-500"></i> ${recipe.time || '30m'}
                                </span>
                                <span class="inline-flex items-center gap-1 bg-emerald-50/80 text-emerald-700 px-1.5 py-1 md:px-2 md:py-1 rounded-md shrink-0">
                                    <i data-lucide="star" class="w-3 h-3 md:w-3.5 md:h-3.5 text-emerald-500 fill-emerald-500"></i> Pilihan
                                </span>
                            </div>
                        </div>
                    `;
                    recipeGrid.appendChild(card);
                });
            }
            lucide.createIcons();
        }

        function openModal(recipe) {
            activeRecipe = recipe;
            activeTab = 'ingredients';
            document.body.classList.add('modal-open');
            modal.classList.remove('hidden');
            renderModal();
        }

        function closeModal() {
            modal.classList.add('hidden');
            document.body.classList.remove('modal-open');
            modalContent.innerHTML = '';
        }

        function setTab(tab) {
            activeTab = tab;
            const container = document.getElementById('tab-container');
            if (container) {
                container.innerHTML = getTabHTML(activeRecipe, activeTab);
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.className = btn.dataset.tab === activeTab
                        ? "tab-btn flex-1 py-4 text-sm font-bold flex items-center justify-center gap-2 tab-active"
                        : "tab-btn flex-1 py-4 text-sm font-bold flex items-center justify-center gap-2 text-gray-400";
                });
                lucide.createIcons();
            } else {
                renderModal();
            }
        }

        function getTabHTML(activeRecipe, activeTab) {
            let tabContent = '';
            if (activeTab === 'ingredients') {
                tabContent = activeRecipe.ingredients.map(sec => `
                    <div class="bg-emerald-50/50 p-4 md:p-8 rounded-3xl md:rounded-[2rem] border border-emerald-100/50 mb-4 md:mb-6">
                        <h4 class="font-black text-emerald-600 uppercase text-[10px] md:text-xs tracking-[0.2em] mb-4 md:mb-6 flex items-center gap-2 md:gap-3">
                            <span class="w-4 md:w-8 h-px bg-emerald-200"></span>${sec.section}<span class="flex-grow h-px bg-emerald-200"></span>
                        </h4>
                        <ul class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                            ${sec.items.map(item => `
                                <li class="flex gap-3 md:gap-4 text-gray-700 font-medium text-xs md:text-sm bg-white p-3 md:p-4 rounded-xl md:rounded-2xl shadow-sm border border-emerald-100/30">
                                    <div class="w-1.5 h-1.5 md:w-2 md:h-2 bg-emerald-500 rounded-full mt-1.5 flex-shrink-0"></div>
                                    ${item}
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `).join('');
            } else if (activeTab === 'steps') {
                tabContent = activeRecipe.instructions.map(sec => `
                    <div class="mb-8 md:mb-10">
                        <h4 class="text-[10px] md:text-sm font-black text-gray-400 uppercase tracking-[0.3em] mb-6 md:mb-8 text-center flex items-center gap-3 md:gap-4">
                            <span class="flex-grow h-px bg-gray-100"></span>${sec.section}<span class="flex-grow h-px bg-gray-100"></span>
                        </h4>
                        <div class="space-y-4 md:space-y-6">
                            ${sec.steps.map((step, i) => `
                                <div class="flex gap-3 md:gap-6 group">
                                    <div class="flex-shrink-0 w-8 h-8 md:w-12 md:h-12 bg-gray-50 border-2 border-gray-100 rounded-xl md:rounded-2xl flex items-center justify-center font-black text-gray-300 md:text-base text-xs group-hover:bg-emerald-600 group-hover:text-white transition-all duration-500">
                                        ${i + 1}
                                    </div>
                                    <div class="pt-1 md:pt-2 flex-grow border-b border-gray-50 pb-6 md:pb-8 last:border-0">
                                        <p class="text-gray-700 leading-relaxed font-medium text-xs md:text-base">${step}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            } else if (activeTab === 'tips') {
                tabContent = `
                    <div class="space-y-4 md:space-y-6">
                        ${activeRecipe.tips.length > 0 ? `
                        <div class="bg-blue-50/50 p-6 md:p-8 rounded-3xl md:rounded-[2rem] border border-blue-100">
                            <h4 class="flex items-center gap-2 text-blue-800 font-black mb-4 uppercase text-[10px] md:text-xs tracking-widest">
                                <i data-lucide="lightbulb" class="w-4 h-4 md:w-5 md:h-5"></i> Tip Masakan
                            </h4>
                            <ul class="space-y-3">
                                ${activeRecipe.tips.map(tip => `<li class="text-blue-700 font-medium text-xs md:text-sm">• ${tip}</li>`).join('')}
                            </ul>
                        </div>` : ''}
                        ${activeRecipe.notes.length > 0 ? `
                        <div class="bg-amber-50/50 p-6 md:p-8 rounded-3xl md:rounded-[2rem] border border-amber-100">
                            <h4 class="flex items-center gap-2 text-amber-800 font-black mb-4 uppercase text-[10px] md:text-xs tracking-widest">
                                <i data-lucide="info" class="w-4 h-4 md:w-5 md:h-5"></i> Nota Penting
                            </h4>
                            <ul class="space-y-3">
                                ${activeRecipe.notes.map(note => `<li class="text-amber-700 font-medium text-xs md:text-sm">• ${note}</li>`).join('')}
                            </ul>
                        </div>` : ''}
                    </div>
                `;
            }
            return tabContent;
        }

        function renderModal() {
            if (!activeRecipe) return;

            const hasTips = activeRecipe.tips.length > 0 || activeRecipe.notes.length > 0;
            let videoEmbed = null;
            if (activeRecipe.video_link) {
                let videoId = '';
                if (activeRecipe.video_link.includes('youtu.be/')) {
                    videoId = activeRecipe.video_link.split('youtu.be/')[1].split('?')[0];
                } else if (activeRecipe.video_link.includes('watch?v=')) {
                    videoId = activeRecipe.video_link.split('watch?v=')[1].split('&')[0];
                }
                videoEmbed = videoId ? `https://www.youtube.com/embed/${videoId}` : null;
            }

            let tabContent = getTabHTML(activeRecipe, activeTab);

            modalContent.innerHTML = `
                <div class="relative h-[35vh] md:h-[60vh] bg-black">
                    ${videoEmbed ? `
                        <iframe src="${videoEmbed}" class="w-full h-full border-none" allowfullscreen></iframe>
                    ` : `
                        <img src="./image of CWC 18/${activeRecipe.slug}.jpeg" class="w-full h-full object-cover opacity-70" onerror="this.src='https://via.placeholder.com/1200x800/111827/ffffff?text=${encodeURIComponent(activeRecipe.title)}'">
                        <div class="absolute inset-0 bg-gradient-to-b from-black/40 to-black/80 flex items-center justify-center p-6 md:p-8">
                            <h2 class="text-3xl md:text-6xl font-black text-white text-center uppercase tracking-tight md:tracking-tighter leading-none">${activeRecipe.title}</h2>
                        </div>
                    `}
                    <button onclick="closeModal()" class="absolute top-4 left-4 md:top-6 md:left-6 p-2 md:p-3 bg-white/90 backdrop-blur-xl text-gray-900 rounded-xl md:rounded-2xl shadow-2xl hover:scale-110 transition-all z-20">
                        <i data-lucide="chevron-left" class="w-5 h-5 md:w-6 md:h-6"></i>
                    </button>
                </div>

                <div class="max-w-4xl mx-auto ${videoEmbed ? 'mt-0' : '-mt-6 md:-mt-8'} relative z-10 w-full mb-10">
                    <div class="bg-white ${videoEmbed ? '' : 'rounded-t-3xl md:rounded-t-[3rem]'} shadow-2xl px-4 py-8 md:p-12 min-h-screen">
                        <div class="flex border-b border-gray-100 mb-6 md:mb-8 sticky top-0 bg-white/95 backdrop-blur-sm z-30 pt-2 -mx-4 px-4 md:mx-0 md:px-0 shadow-sm md:shadow-none">
                            <button data-tab="ingredients" onclick="setTab('ingredients')" class="tab-btn flex-1 py-3 md:py-4 text-[11px] md:text-sm font-extrabold flex items-center justify-center gap-1.5 md:gap-2 ${activeTab === 'ingredients' ? 'tab-active' : 'text-gray-400'} transition-all">
                                <i data-lucide="book-open" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> Bahan
                            </button>
                            <button data-tab="steps" onclick="setTab('steps')" class="tab-btn flex-1 py-3 md:py-4 text-[11px] md:text-sm font-extrabold flex items-center justify-center gap-1.5 md:gap-2 ${activeTab === 'steps' ? 'tab-active' : 'text-gray-400'} transition-all">
                                <i data-lucide="chef-hat" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> Cara
                            </button>
                            ${hasTips ? `
                            <button data-tab="tips" onclick="setTab('tips')" class="tab-btn flex-1 py-3 md:py-4 text-[11px] md:text-sm font-extrabold flex items-center justify-center gap-1.5 md:gap-2 ${activeTab === 'tips' ? 'tab-active' : 'text-gray-400'} transition-all">
                                <i data-lucide="lightbulb" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> Tips
                            </button>` : ''}
                        </div>
                        <div id="tab-container" class="animate-fade-in">${tabContent}</div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        searchInput.oninput = (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = RECIPES_DATA.filter(r =>
                r.title.toLowerCase().includes(term) ||
                r.ingredients.some(s => s.items.some(i => i.toLowerCase().includes(term)))
            );
            renderRecipes(filtered);
        };

        // Initialize
        window.onload = () => {
            renderRecipes(RECIPES_DATA);
        };
    </script>
</body>

</html>
