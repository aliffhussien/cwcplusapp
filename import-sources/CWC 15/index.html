<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cooking With Cattitude Volume 15 - A collection of delicious recipes">
    <meta name="keywords" content="recipes, cooking, food, CWC, Cooking With Cattitude">
    <meta name="author" content="Cooking With Cattitude">

    <!-- App Icon -->
    <link rel="icon" type="image/svg+xml" href="image/CWC-icon.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <title>Cooking With Cattitude - Volume 15</title>
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <img src="image/CWC-icon.svg" alt="CWC Icon" class="logo-icon">
                    <div class="logo-text">
                        <h1>Cooking With Cattitude</h1>
                        <span class="volume-badge">Volume 15</span>
                    </div>
                </div>

                <!-- Search Bar -->
                <div class="search-container">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="Search recipes...">
                    <button id="clearSearch" class="clear-search" aria-label="Clear search">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Filter Bar -->
    <section class="filter-section">
        <div class="container">
            <div class="filter-container">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="Main">Main Dishes</button>
                <button class="filter-btn" data-filter="Dessert">Desserts</button>
                <button class="filter-btn" data-filter="Ayam">Chicken</button>
                <button class="filter-btn" data-filter="Beef">Beef</button>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Recipe Count -->
            <div class="recipe-count">
                <span id="recipeCount">0</span> recipes found
            </div>

            <!-- Recipe Grid -->
            <div id="recipeGrid" class="recipe-grid">
                <!-- Recipe cards will be dynamically inserted here -->
            </div>

            <!-- No Results Message -->
            <div id="noResults" class="no-results hidden">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 8v4M12 16h.01"></path>
                </svg>
                <h3>No recipes found</h3>
                <p>Try adjusting your search or filters</p>
            </div>
        </div>
    </main>

    <!-- Recipe Detail Modal -->
    <div id="recipeModal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <!-- Close Button -->
            <button class="modal-close" aria-label="Close recipe details">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>

            <!-- Recipe Header -->
            <div class="recipe-header">
                <div class="recipe-media-container">
                    <!-- Video will be inserted here if available, otherwise image -->
                    <div id="recipeMedia"></div>
                </div>

                <div class="recipe-title-section">
                    <h2 id="recipeTitle"></h2>
                    <div class="recipe-meta">
                        <span id="recipeCategory" class="category-tag"></span>
                        <div id="recipeTags" class="recipe-tags"></div>
                    </div>
                </div>
            </div>

            <!-- Tabs Navigation -->
            <div class="tabs-nav">
                <button class="tab-btn active" data-tab="ingredients">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7">
                        </path>
                    </svg>
                    Ingredients
                </button>
                <button class="tab-btn" data-tab="steps">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6"></line>
                        <line x1="8" y1="12" x2="21" y2="12"></line>
                        <line x1="8" y1="18" x2="21" y2="18"></line>
                        <line x1="3" y1="6" x2="3.01" y2="6"></line>
                        <line x1="3" y1="12" x2="3.01" y2="12"></line>
                        <line x1="3" y1="18" x2="3.01" y2="18"></line>
                    </svg>
                    Steps
                </button>
                <button class="tab-btn" data-tab="notes">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    Notes
                </button>
            </div>

            <!-- Tab Content -->
            <div class="tab-content">
                <!-- Ingredients Tab -->
                <div class="tab-pane active" id="ingredientsTab">
                    <ul id="ingredientsList" class="ingredients-list"></ul>
                </div>

                <!-- Steps Tab -->
                <div class="tab-pane" id="stepsTab">
                    <ol id="stepsList" class="steps-list"></ol>
                </div>

                <!-- Notes Tab -->
                <div class="tab-pane" id="notesTab">
                    <div id="notesContent" class="notes-content"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Cooking With Cattitude. All recipes from Volume 15.</p>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
