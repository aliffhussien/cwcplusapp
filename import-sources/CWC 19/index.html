        }

            from {

                                <i data-lucide="book-open" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> Bahan
                            </button>
                            <button data-tab="steps" onclick="setTab('steps')" class="tab-btn flex-1 py-3 md:py-4 text-[11px] md:text-sm font-extrabold flex items-center justify-center gap-1.5 md:gap-2 ${activeTab === 'steps' ? 'tab-active' : 'text-gray-400 dark:text-gray-500'} transition-all">
                                <i data-lucide="chef-hat" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> Cara
                            </button>
                            ${hasTips ? `
                            <button data-tab="tips" onclick="setTab('tips')" class="tab-btn flex-1 py-3 md:py-4 text-[11px] md:text-sm font-extrabold flex items-center justify-center gap-1.5 md:gap-2 ${activeTab === 'tips' ? 'tab-active' : 'text-gray-400 dark:text-gray-500'} transition-all">
                                <i data-lucide="lightbulb" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> Tips
                            </button>` : ''}
                        </div>
                        <div id="tab-container" class="animate-fade-in">${tabContent}</div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        searchInput.oninput = (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = RECIPES_DATA.filter(r =>
                r.title.toLowerCase().includes(term) ||
                r.ingredients.some(s => s.items.some(i => i.toLowerCase().includes(term)))
            );
            renderRecipes(filtered);
        };

        // Initialize
        window.onload = () => {
            renderRecipes(RECIPES_DATA);
        };
    </script>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const root = document.documentElement;

        themeToggle.addEventListener('click', () => {
            root.classList.toggle('dark');
            if (root.classList.contains('dark')) {
                localStorage.theme = 'dark';
            } else {
                localStorage.theme = 'light';
            }
        });
    </script>
</body>

</html>
